services:
  - type: web
    name: smartefd-ai-bridge
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 2 --timeout 120
    envVars:
      - key: WALLET_PRIVATE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0